<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DavesFunRC</title>
    <meta
      name="description"
      content="DavesFunRC — budget-friendly RC plane builds, how-tos and videos."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // GitHub Pages SPA fallback: decode the redirect query string that
      // public/404.html encodes a direct-navigated route into.
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, '', redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
